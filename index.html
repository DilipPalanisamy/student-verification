<!DOCTYPE html>
<html>

<head>
    <title>Student Verification</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }
        
        form {
            max-width: 300px;
            margin: auto;
            background-color: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }
        
        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        
        #message {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>Student Registration</h2>
    <form>
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="password" placeholder="password" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="course" placeholder="Course Eg:AIDS or CSE" required>
        <button type="button" onclick="submitForm()">Register</button>
    </form>
    <div id="message"></div>
    <script>
        function submitForm() {
            var firstName = document.getElementById("firstName").value;
            var password = document.getElementById("password").value;
            var email = document.getElementById("email").value;
            var course = document.getElementById("course").value;
            var message = document.getElementById("message");
            if (firstName == "dilip" && password == "dilip@#98" && email == "dilippalanisamy09@gmail.com" && course == "AIML") {
                message.innerHTML = "Verification Successful!";
                alert("Verification Successful!");
                message.style.color = "green";
            } else if (firstName != "" && password != "" && email != "" && course != "") {
                message.innerHTML = "Wrong input.";
                message.style.color = "red";
            } else {
                message.innerHTML = "Please fill in all fields.";
                message.style.color = "red";
            }
        }
    </script>
</body>

</html>
